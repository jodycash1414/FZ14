
<div style="position:relative;height:580px;overflow:hidden;border-radius:12px;user-select:none;">
  <canvas id="cv" style="position:absolute;inset:0;width:100%;height:100%;display:block;"></canvas>

  <div class="tl" id="fila"  style="font-family:'Palatino Linotype',Palatino,serif;font-size:clamp(2.8rem,10vw,6rem);font-weight:300;color:#f5f0e8;letter-spacing:0.35em;position:absolute;top:36%;left:50%;transform:translateX(-50%);white-space:nowrap;opacity:0;pointer-events:none;">FILA</div>
  <div class="tl" id="row"   style="font-family:'Palatino Linotype',Palatino,serif;font-style:italic;font-size:clamp(0.65rem,2vw,1rem);color:#c9a96e;letter-spacing:0.6em;position:absolute;top:54%;left:50%;transform:translateX(-50%);white-space:nowrap;opacity:0;pointer-events:none;">row &nbsp;·&nbsp; line &nbsp;·&nbsp; file</div>
  <div class="tl" id="azul"  style="font-family:'Times New Roman',Georgia,serif;font-size:clamp(3.5rem,13vw,9rem);font-weight:900;color:#f5f0e8;letter-spacing:0.12em;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);white-space:nowrap;opacity:0;pointer-events:none;">AZUL</div>
  <div class="tl" id="blue"  style="font-family:'Palatino Linotype',Palatino,serif;font-style:italic;font-size:clamp(0.6rem,1.5vw,0.9rem);color:rgba(201,169,110,0.55);letter-spacing:0.5em;position:absolute;top:66%;left:50%;transform:translateX(-50%);white-space:nowrap;opacity:0;pointer-events:none;">blue &nbsp;·&nbsp; blue weber agave &nbsp;·&nbsp; tequila</div>
  <div class="tl" id="logo"  style="font-family:'Times New Roman',Georgia,serif;font-size:clamp(1.8rem,7vw,5rem);font-weight:700;color:#f5f0e8;letter-spacing:0.5em;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);white-space:nowrap;opacity:0;pointer-events:none;">FILAZUL</div>
  <div class="tl" id="tag"   style="font-family:'Palatino Linotype',Palatino,serif;font-style:italic;font-size:clamp(0.55rem,1.3vw,0.8rem);color:rgba(201,169,110,0.6);letter-spacing:0.4em;position:absolute;top:62%;left:50%;transform:translateX(-50%);white-space:nowrap;opacity:0;pointer-events:none;">jalisco highlands &nbsp;·&nbsp; méxico</div>

  <div id="hint" style="position:absolute;bottom:48px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none;transition:opacity 0.8s;">
    <span style="font-family:'Palatino Linotype',serif;font-style:italic;color:rgba(245,240,232,0.4);font-size:11px;letter-spacing:0.35em;">scroll</span>
    <div id="arrow" style="width:1px;height:32px;background:linear-gradient(to bottom,rgba(245,240,232,0.45),transparent);"></div>
  </div>

  <div id="pb" style="position:absolute;bottom:0;left:0;height:2px;background:rgba(201,169,110,0.5);width:0%;transition:width 0.05s linear;"></div>
  <div style="position:absolute;top:10px;right:12px;font-family:'Palatino Linotype',serif;font-style:italic;font-size:10px;color:rgba(201,169,110,0.3);letter-spacing:0.25em;pointer-events:none;">concept demo</div>

  <div id="track" style="position:absolute;inset:0;overflow-y:scroll;z-index:20;opacity:0;">
    <div style="height:5600px;"></div>
  </div>
</div>

<style>
#arrow{animation:ap 2s ease-in-out infinite;}
@keyframes ap{0%,100%{opacity:0.4}50%{opacity:1}}
</style>

<script>
(function(){
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const tr=document.getElementById('track');
let W,H,noise;

function sz(){
  const r=cv.parentElement.getBoundingClientRect();
  W=cv.width=r.width;H=cv.height=r.height;
  noise=buildNoise();
}

function buildNoise(){
  const c=document.createElement('canvas');
  c.width=W;c.height=H;
  const x=c.getContext('2d');
  const id=x.createImageData(W,H);
  for(let i=0;i<id.data.length;i+=4){
    const v=Math.random()*18;
    id.data[i]=id.data[i+1]=id.data[i+2]=v;
    id.data[i+3]=22;
  }
  x.putImageData(id,0,0);
  return c;
}

sz();
window.addEventListener('resize',sz);

const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,lo,hi)=>Math.min(hi,Math.max(lo,v));
const map=(v,a,b,c,d)=>c+(d-c)*clamp((v-a)/(b-a),0,1);
const ease=t=>t<0.5?2*t*t:-1+(4-2*t)*t;

let prog=0,target=0;
tr.addEventListener('scroll',()=>{
  const max=tr.scrollHeight-tr.clientHeight;
  target=clamp(tr.scrollTop/max,0,1);
},{passive:true});

function plant(cx,cy,sz2){
  if(sz2<0.7)return;
  ctx.save();ctx.translate(cx,cy);
  for(let i=0;i<11;i++){
    const ang=(i/11)*Math.PI*2+0.3;
    ctx.save();ctx.rotate(ang);
    const L=sz2,w=sz2*0.11;
    ctx.beginPath();
    ctx.moveTo(0,sz2*0.06);
    ctx.bezierCurveTo(w*1.3,L*0.12,w*0.8,L*0.66,0,L);
    ctx.bezierCurveTo(-w*0.8,L*0.66,-w*1.3,L*0.12,0,sz2*0.06);
    const h2=152+(i%4)*7,s2=30+(i%3)*8,l2=22+(i%5)*4;
    ctx.fillStyle=`hsl(${h2},${s2}%,${l2}%)`;
    ctx.fill();
    ctx.restore();
  }
  ctx.beginPath();ctx.arc(0,0,sz2*0.13,0,Math.PI*2);
  ctx.fillStyle='#7abf98';ctx.fill();
  ctx.restore();
}

function drawTop(zoom,cx2,cy2,alpha){
  ctx.save();ctx.globalAlpha=alpha;
  ctx.fillStyle='#c8a778';ctx.fillRect(0,0,W,H);
  const sg=ctx.createRadialGradient(W*.4,H*.45,0,W*.5,H*.5,W*.8);
  sg.addColorStop(0,'rgba(210,185,140,0.3)');sg.addColorStop(1,'rgba(100,75,40,0.2)');
  ctx.fillStyle=sg;ctx.fillRect(0,0,W,H);
  const PR=22,RW=PR*2.1,GAP=RW*2,RS=RW+2*GAP,PS=PR*3.4;
  const hW=W/(2*zoom),hH=H/(2*zoom);
  const wL=cx2-hW,wR=cx2+hW,wT=cy2-hH,wB=cy2+hH;
  const r0=Math.floor(wL/RS)-1,r1=Math.ceil(wR/RS)+1;
  for(let r=r0;r<=r1;r++){
    const rx=r*RS;
    const sL=(rx-RW/2-cx2)*zoom+W/2;
    ctx.fillStyle='rgba(80,55,25,0.1)';ctx.fillRect(sL,0,RW*zoom,H);
    const p0=Math.floor(wT/PS)-1,p1=Math.ceil(wB/PS)+1;
    for(let p=p0;p<=p1;p++){
      const sx=(rx-cx2)*zoom+W/2,sy=(p*PS-cy2)*zoom+H/2;
      plant(sx,sy,PR*zoom);
    }
  }
  if(noise){ctx.globalAlpha=alpha*0.3;ctx.drawImage(noise,0,0,W,H);ctx.globalAlpha=alpha;}
  const v=ctx.createRadialGradient(W/2,H/2,H*.25,W/2,H/2,H*.85);
  v.addColorStop(0,'rgba(0,0,0,0)');v.addColorStop(1,'rgba(0,0,0,0.5)');
  ctx.fillStyle=v;ctx.fillRect(0,0,W,H);ctx.restore();
}

function plantP(cx2,by,h,a){
  if(h<2)return;ctx.save();ctx.globalAlpha=a||1;ctx.translate(cx2,by);
  for(let i=0;i<8;i++){
    const t2=i/7,sp=(t2-0.5)*2,lx=sp*h*0.88,ly=-h*(0.55+Math.abs(sp)*0.35),lw=h*(0.055+Math.abs(sp)*0.02);
    ctx.beginPath();ctx.moveTo(0,0);ctx.quadraticCurveTo(lx*.35,ly*.28,lx,ly);
    ctx.strokeStyle=`hsl(158,${28+i*5}%,${20+i*3}%)`;ctx.lineWidth=lw;ctx.lineCap='round';ctx.stroke();
  }
  ctx.restore();
}

function drawGround(hFar,alpha){
  ctx.save();ctx.globalAlpha=alpha;
  const hY=H*lerp(0.54,0.37,hFar);
  const sky=ctx.createLinearGradient(0,0,0,hY);
  sky.addColorStop(0,'#080512');sky.addColorStop(0.35,'#140c30');
  sky.addColorStop(0.75,'#5e2e0e');sky.addColorStop(1,'#b8681a');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,hY);
  const sA=map(hFar,0,0.8,0.75,0);
  if(sA>0.01){
    ctx.save();ctx.globalAlpha=alpha*sA;
    for(let i=0;i<60;i++){
      const sx=((i*137.5)%1)*W,sy=((i*61.8)%1)*hY*.78,sr=0.4+(i%3)*.35;
      ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fill();
    }
    ctx.restore();
  }
  const gw=ctx.createRadialGradient(W/2,hY,0,W/2,hY,W*.65);
  gw.addColorStop(0,'rgba(190,100,25,0.5)');gw.addColorStop(1,'rgba(190,100,25,0)');
  ctx.fillStyle=gw;ctx.fillRect(0,hY-H*.35,W,H*.7);
  const gnd=ctx.createLinearGradient(0,hY,0,H);
  gnd.addColorStop(0,'#b08450');gnd.addColorStop(1,'#6a4220');
  ctx.fillStyle=gnd;ctx.fillRect(0,hY,W,H-hY);
  const VP={x:W/2,y:hY};
  for(let r=-8;r<=8;r++){
    if(!r)continue;
    const sp=lerp(0.075,0.055,hFar),bx=W/2+r*W*sp;
    ctx.beginPath();ctx.moveTo(VP.x,VP.y);ctx.lineTo(bx,H*1.05);
    ctx.strokeStyle='rgba(80,50,20,0.2)';ctx.lineWidth=1;ctx.stroke();
    const np=Math.round(lerp(3,7,hFar));
    for(let p=0;p<np;p++){
      const t2=(p+1)/(np+1),py=lerp(hY+2,H*1.08,Math.pow(t2,0.65));
      const px=lerp(VP.x,bx,Math.pow(t2,0.58)),ph=lerp(2,H*.22,Math.pow(t2,1.15));
      plantP(px,py,ph,0.85);
    }
  }
  if(noise){ctx.globalAlpha=alpha*0.25;ctx.drawImage(noise,0,0,W,H);ctx.globalAlpha=alpha;}
  const vig=ctx.createRadialGradient(W/2,H/2,H*.2,W/2,H/2,H*.9);
  vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,0.6)');
  ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);ctx.restore();
}

function drawReveal(lp){
  ctx.save();
  ctx.fillStyle=`rgba(6,3,16,${map(lp,0,0.35,0,0.94)})`;ctx.fillRect(0,0,W,H);
  if(lp>0.18){
    const fA=map(lp,0.18,0.48,0,1)*map(lp,0.72,0.95,1,0);
    if(fA>0.005){
      ctx.save();ctx.globalAlpha=fA*0.07;
      ctx.font=`900 ${H*2.4}px Georgia,serif`;ctx.fillStyle='#f5f0e8';
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('F',W/2,H/2);
      ctx.restore();
      ctx.save();ctx.globalAlpha=fA*0.15;
      ctx.font=`900 ${H*2.4}px Georgia,serif`;ctx.strokeStyle='#c9a96e';ctx.lineWidth=2;
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.strokeText('F',W/2,H/2);
      ctx.restore();
    }
  }
  if(lp>0.52){
    const revA=map(lp,0.52,0.80,0,1);
    if(revA>0.01){
      ctx.save();
      const rr=lerp(H*0.04,H*0.55,ease(map(lp,0.52,0.85,0,1)));
      ctx.beginPath();ctx.arc(W/2,H/2,rr,0,Math.PI*2);ctx.clip();
      drawGround(0.9,1);ctx.restore();
      ctx.save();ctx.globalAlpha=revA*0.45;
      const rg=ctx.createRadialGradient(W/2,H/2,rr*.85,W/2,H/2,rr*1.1);
      rg.addColorStop(0,'rgba(201,169,110,0)');rg.addColorStop(0.7,'rgba(201,169,110,0.4)');rg.addColorStop(1,'rgba(201,169,110,0)');
      ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);ctx.restore();
    }
  }
  ctx.restore();
}

function draw(p){
  ctx.clearRect(0,0,W,H);
  let zoom;
  if(p<=0.14){zoom=14;}
  else if(p<=0.42){const t=ease(map(p,0.14,0.42,0,1));zoom=lerp(14,1.7,t);}
  else if(p<=0.56){const t=ease(map(p,0.42,0.56,0,1));zoom=lerp(1.7,34,t);}
  else{zoom=34;}
  if(p<=0.56){drawTop(zoom,0,0,1);}
  else if(p<=0.66){const t=ease(map(p,0.56,0.66,0,1));drawTop(34,0,0,1-t);if(t>0.02)drawGround(0,t);}
  else if(p<=0.80){drawGround(ease(map(p,0.66,0.80,0,1)),1);}
  else{const gf=map(p,0.80,0.87,1,0);if(gf>0.01)drawGround(1,gf);drawReveal(map(p,0.80,1.0,0,1));}
}

function txt(p){
  const s=(id,v)=>{document.getElementById(id).style.opacity=clamp(v,0,1);};
  s('fila',map(p,0.17,0.24,0,1)*(1-map(p,0.36,0.43,0,1)));
  s('row', map(p,0.21,0.27,0,1)*(1-map(p,0.36,0.43,0,1)));
  s('azul',map(p,0.50,0.58,0,1)*(1-map(p,0.63,0.69,0,1)));
  s('blue',map(p,0.53,0.59,0,0.75)*(1-map(p,0.63,0.69,0,1)));
  s('logo',map(p,0.69,0.75,0,1)*(1-map(p,0.84,0.91,0,1)));
  s('tag', map(p,0.73,0.78,0,1)*(1-map(p,0.84,0.91,0,1)));
  document.getElementById('hint').style.opacity=p<0.04?'1':'0';
  document.getElementById('pb').style.width=(p*100)+'%';
}

(function loop(){
  prog=lerp(prog,target,0.075);
  draw(prog);txt(prog);
  requestAnimationFrame(loop);
})();
})();
</script>
